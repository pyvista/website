name: Build and Deploy

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  statuses: write
  deployments: write

concurrency:
  group: netlify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install node dependencies
        run: npm ci
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  build:
    name: Build site
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: dist
          retention-days: 7

  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-build
          path: dist

      - name: Deploy site
        id: netlify
        uses: nwtgck/actions-netlify@4cbaf4c08f1a7bfa537d6113472ef4424e4eb654
        with:
          publish-dir: dist
          production-deploy: ${{ github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Deploy from GitHub Actions (${{ github.sha }})'
          enable-pull-request-comment: true
          enable-commit-comment: false
          enable-commit-status: false
          overwrites-pull-request-comment: true
          github-deployment-environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
          github-deployment-description: 'PyVista website'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10

      - name: Create commit status with preview link
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_URL: ${{ steps.netlify.outputs.deploy-url }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=success \
            -f context="Deploy / Website Preview" \
            -f description="Website preview is ready" \
            -f target_url="$DEPLOY_URL"

      - name: Add deploy link to job summary
        env:
          DEPLOY_URL: ${{ steps.netlify.outputs.deploy-url }}
        run: |
          {
            echo "### Website Deployment"
            echo ""
            echo "- **Type:** ${{ github.ref == 'refs/heads/main' && 'Production' || 'Preview' }}"
            echo "- **URL:** $DEPLOY_URL"
          } >> "$GITHUB_STEP_SUMMARY"
