ci:
  autoupdate_commit_msg: 'chore: update pre-commit hooks'
  autofix_commit_msg: 'style: pre-commit fixes'
  autofix_prs: true
  autoupdate_schedule: monthly

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=4000]
      - id: end-of-file-fixer
        exclude: ^(public/.*|.*\.svg)$
      - id: trailing-whitespace
        exclude: ^(public/.*|.*\.svg)$
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        # Runs the locally installed prettier (see package.json devDependencies)
        # so that prettier-plugin-astro resolves from node_modules.
        entry: npx --no-install prettier --write --ignore-unknown
        language: system
        pass_filenames: true
        types_or: [javascript, ts, tsx, astro, css, json, yaml, markdown]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies: [tomli]
        exclude: ^(package-lock\.json|public/|dist/|\.astro/)
