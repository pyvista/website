[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["node_modules", "dist", ".astro", ".netlify"]

[tool.ruff.format]
quote-style = "single"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
    "D",   # pydocstyle
]
ignore = [
    "D203", # one-blank-line-before-class (conflicts with D211)
    "D213", # multi-line-summary-second-line (conflicts with D212)
]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.codespell]
skip = "package-lock.json,./public/*,./dist/*,./.astro/*,./node_modules/*"
